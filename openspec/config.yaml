# OpenSpec — Camping Survivor
# Default workflow schema for all new changes (see openspec/schemas/roblox-slice/)

schema: roblox-slice

context: |
  Project: Camping Survivor — Roblox survival game (Luau, Rojo, Wally, ProfileStore).
  Product spec: docs/GDD-Camping-Survivor.md v1.2
  Implementation index: docs/Implementation-Plan.md
  Architecture: Services (server) + Controllers (client) + Repositories (persistence only).
  Default locale: en. Launch locales: en, es. All player-visible text uses Localization keys.
  Remotes registry: src/ReplicatedStorage/Shared/Constants/Remotes.luau
  One vertical slice at a time. Active change path in workflow.active_change below.
  Cursor rules: .cursor/rules/roblox-*.mdc (always apply).

rules:
  proposal:
    - Map each slice to GDD chapter and openspec/specs capability
    - Include explicit out-of-scope section
    - Name changes slice-XX-<capability> when part of Implementation-Plan
  design:
    - List services, controllers, remotes, types, and security validations
    - UI must be passive; business logic only in services
  specs:
    - Use ADDED/MODIFIED/REMOVED deltas; scenarios with #### Scenario headers
    - Use SHALL/MUST for requirements
  tasks:
    - Checkbox format - [ ] only; group under ## numbered headings
    - Include verify step and archive step as final tasks
  verify:
    - Include rojo build, Studio manual checks, and regression from prior slices

# --- Project metadata (OpenSpec CLI ignores; used by humans and Camping Survivor tooling) ---

project:
  name: camping-survivor
  language: luau
  platform: roblox

sources:
  product_spec: docs/GDD-Camping-Survivor.md
  product_spec_version: "1.2"
  implementation_index: docs/Implementation-Plan.md

localization:
  default_locale: en
  launch_locales: [en, es]
  extensible: true
  spec: openspec/specs/localization/spec.md
  module_path: src/ReplicatedStorage/Shared/Localization
  profile_setting: settings.locale

stack:
  build: rojo
  packages: wally
  persistence: ProfileStore
  architecture: Services + Controllers + Repositories

cursor_rules:
  - .cursor/rules/roblox-core.mdc
  - .cursor/rules/roblox-architecture.mdc
  - .cursor/rules/roblox-networking.mdc
  - .cursor/rules/roblox-security.mdc
  - .cursor/rules/roblox-datastore.mdc
  - .cursor/rules/roblox-ui.mdc
  - .cursor/rules/roblox-types.mdc
  - .cursor/rules/roblox-performance.mdc
  - .cursor/rules/roblox-openspec.mdc
  - .cursor/rules/roblox-i18n.mdc

capabilities:
  foundation:
    gdd: Infrastructure
    spec: openspec/specs/foundation/spec.md
  survival:
    gdd: "Cap. 3"
    spec: openspec/specs/survival/spec.md
  inventory:
    gdd: "Cap. 4"
    spec: openspec/specs/inventory/spec.md
  crafting:
    gdd: "Cap. 4"
    spec: openspec/specs/crafting/spec.md
  camp:
    gdd: "Cap. 6"
    spec: openspec/specs/camp/spec.md
  world:
    gdd: "Cap. 5"
    spec: openspec/specs/world/spec.md
  helpers:
    gdd: "§2.13"
    spec: openspec/specs/helpers/spec.md
  quests:
    gdd: "Cap. 8"
    spec: openspec/specs/quests/spec.md
  multiplayer:
    gdd: "Cap. 7"
    spec: openspec/specs/multiplayer/spec.md
  economy:
    gdd: "Cap. 9"
    spec: openspec/specs/economy/spec.md
  ui:
    gdd: "Cap. 10"
    spec: openspec/specs/ui/spec.md
  localization:
    gdd: "§1.11"
    spec: openspec/specs/localization/spec.md

conventions:
  remotes_registry: src/ReplicatedStorage/Shared/Constants/Remotes.luau
  profile_types: src/ReplicatedStorage/Shared/Types/PlayerProfile.luau
  profile_template: src/ReplicatedStorage/Shared/Constants/PlayerProfileTemplate.luau
  items_constants: src/ReplicatedStorage/Shared/Constants/Items.luau
  recipes_constants: src/ReplicatedStorage/Shared/Constants/Recipes.luau
  localization_module: src/ReplicatedStorage/Shared/Localization/Localization.luau
  locale_tables: src/ReplicatedStorage/Shared/Localization/Locales/

workflow:
  active_change: openspec/changes/slice-05-camp
  one_slice_at_a_time: true
  archive_path: openspec/changes/archive
  schema_path: openspec/schemas/roblox-slice/schema.yaml
