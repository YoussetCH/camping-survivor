# Schema for Camping Survivor implementation slices (OpenSpec-compatible)

name: roblox-slice
description: Vertical slice workflow for Luau/Roblox features

artifacts:
  - id: proposal
    file: proposal.md
    description: Why, scope, out of scope

  - id: design
    file: design.md
    depends_on: [proposal]
    description: Services, controllers, remotes, types, validation

  - id: specs
    file: specs/**/*.md
    depends_on: [proposal]
    description: Delta ADDED/MODIFIED/REMOVED requirements

  - id: tasks
    file: tasks.md
    depends_on: [design, specs]
    description: Implementation checklist

  - id: verify
    file: verify.md
    depends_on: [tasks]
    description: Done criteria for Studio + Rojo

apply:
  - Read all artifacts before coding
  - One slice at a time
  - Mark tasks complete only when implemented
  - Run verify before archive

archive:
  - Merge spec deltas into openspec/specs/
  - Move change folder to openspec/changes/archive/YYYY-MM-DD-<slice-id>/
